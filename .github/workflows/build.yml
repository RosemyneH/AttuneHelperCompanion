# One workflow, one matrix build, and published GitHub Releases.
# Pushes to master create an automatic build tag/release from the artifacts that were
# just built. Version tags (v*) create official releases from the same build flow.
#
# Note: The GitHub Actions UI and workflow artifacts list do not show embedded app icons
# (generic zip/file icons). The Windows .exe and Linux AppImage still carry their icons
# (Explorer, desktop, file manager) after you download and extract.
name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0 cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Assemble debug APK
        run: bash "$GITHUB_WORKSPACE/scripts/android-verify.sh"

      - name: Assemble release APK (signed, release builds with secrets)
        if: success() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master')
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/release-ci.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "No ANDROID_KEYSTORE_B64: skipping signed release (push debug artifact only)"
            exit 0
          fi
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release-ci.keystore
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: attune_helper_companion_android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload signed release APK
        if: success() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: attune_helper_companion_android_release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC)
            os: windows-2022
            label: windows
            artifact: build/attune_helper_companion.exe
          - name: Linux (GCC)
            os: ubuntu-22.04
            label: linux
            # Real AppImage from packaging/appimage/build-appimage.sh (not a bare ELF)
            artifact: build-appimage/AttuneHelperCompanion-Linux-x86_64.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: MSVC environment (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build and test
        shell: bash
        env:
          CI_BUILD_DIR: ${{ github.workspace }}/build
        # RUNNER_OS is provided by GitHub (Linux, Windows) for ci-build.sh
        run: bash "$GITHUB_WORKSPACE/scripts/ci-build.sh"

      - name: Build AppImage (Linux)
        if: matrix.label == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 librsvg2-bin imagemagick
          cd "$GITHUB_WORKSPACE"
          bash "$GITHUB_WORKSPACE/packaging/appimage/build-appimage.sh"
          shopt -s nullglob
          imgs=(build-appimage/Attune-Helper-Companion-x86_64-*.AppImage)
          if [ "${#imgs[@]}" -ne 1 ] || [ ! -f "${imgs[0]}" ]; then
            echo "Expected one build-appimage/Attune-Helper-Companion-x86_64-*.AppImage" >&2
            ls -la build-appimage/ || true
            exit 1
          fi
          cp -f "${imgs[0]}" build-appimage/AttuneHelperCompanion-Linux-x86_64.AppImage
          chmod a+x build-appimage/AttuneHelperCompanion-Linux-x86_64.AppImage
          ls -la build-appimage/AttuneHelperCompanion-Linux-x86_64.AppImage

      - name: Upload attune helper companion
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: attune_helper_companion_${{ matrix.label }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: [build, build_apk]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            name="Attune Helper Companion $GITHUB_REF_NAME"
            prerelease=false
          else
            short="${GITHUB_SHA::7}"
            tag="build-${GITHUB_RUN_NUMBER}-${short}"
            name="Attune Helper Companion build ${GITHUB_RUN_NUMBER} (${short})"
            prerelease=true
          fi
          {
            echo "AHC_RELEASE_TAG=$tag"
            echo "AHC_RELEASE_NAME=$name"
            echo "AHC_RELEASE_PRERELEASE=$prerelease"
          } >> "$GITHUB_ENV"

      - name: Choose Android release APK
        shell: bash
        run: |
          set -euo pipefail
          d="$GITHUB_WORKSPACE/release-assets/attune_helper_companion_android"
          r="$GITHUB_WORKSPACE/release-assets/attune_helper_companion_android_release"
          out="$d/AttuneHelperCompanion-android.apk"
          if [ -f "$r/app-release.apk" ]; then
            cp -f "$r/app-release.apk" "$out"
            echo "Using signed app-release.apk for GitHub Release"
          else
            cp -f "$d/app-debug.apk" "$out"
            echo "Using app-debug.apk (set ANDROID_KEYSTORE_* secrets to ship a signed release build)"
          fi
          ls -la "$out"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.AHC_RELEASE_NAME }}
          generate_release_notes: true
          files: |
            release-assets/attune_helper_companion_windows/attune_helper_companion.exe
            release-assets/attune_helper_companion_linux/AttuneHelperCompanion-Linux-x86_64.AppImage
            release-assets/attune_helper_companion_android/AttuneHelperCompanion-android.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ env.AHC_RELEASE_PRERELEASE == 'true' }}
          tag_name: ${{ env.AHC_RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
