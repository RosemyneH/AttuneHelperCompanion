# One workflow, one matrix build, and (on version tags) a published GitHub Release.
# Pushes/PRs only upload workflow artifacts; they do not create a Release. Push tag v* to release.
name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0 cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          arguments: assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: attune_helper_companion_android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC)
            os: windows-2022
            label: windows
            artifact: build/attune_helper_companion.exe
          - name: Linux (GCC)
            os: ubuntu-22.04
            label: linux
            artifact: build/attune_helper_companion

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: MSVC environment (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build and test
        shell: bash
        env:
          CI_BUILD_DIR: ${{ github.workspace }}/build
        # RUNNER_OS is provided by GitHub (Linux, Windows) for ci-build.sh
        run: bash "$GITHUB_WORKSPACE/scripts/ci-build.sh"

      - name: Upload attune helper companion
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: attune_helper_companion_${{ matrix.label }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build_apk]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Attune Helper Companion ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/attune_helper_companion_windows/attune_helper_companion.exe
            release-assets/attune_helper_companion_linux/attune_helper_companion
            release-assets/attune_helper_companion_android/app-debug.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
